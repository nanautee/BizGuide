<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>BizGuide</title>
  <style type="text/css">
    body,
    table,
    td,
    a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table {
      border-collapse: collapse !important;
    }
    img {
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
    }
    @media only screen and (max-width: 600px) {
      .email-shell {
        padding: 16px 10px !important;
      }
      .email-card {
        height: auto !important;
        min-height: 480px !important;
      }
      .email-spacer-top {
        height: 180px !important;
        line-height: 180px !important;
      }
      .email-spacer-mid {
        height: 72px !important;
        line-height: 72px !important;
      }
      .email-pad {
        padding-left: 18px !important;
        padding-right: 18px !important;
      }
      .email-pad-tight {
        padding-left: 18px !important;
        padding-right: 18px !important;
      }
      .email-h1 {
        font-size: 20px !important;
        line-height: 1.25 !important;
      }
      .email-lead {
        font-size: 15px !important;
        line-height: 1.45 !important;
      }
      .email-body {
        font-size: 14px !important;
        line-height: 1.5 !important;
      }
      .email-btn-wrap {
        padding-left: 16px !important;
        padding-right: 16px !important;
      }
      .email-btn {
        display: block !important;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
        padding: 14px 20px !important;
        font-size: 15px !important;
      }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#dbeafe;font-family:Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#dbeafe;font-family:Helvetica,Arial,sans-serif;">
    <tr>
      <td align="center" class="email-shell" style="padding:24px 12px;font-family:Helvetica,Arial,sans-serif;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:560px;border-collapse:collapse;font-family:Helvetica,Arial,sans-serif;">
          <tr>
            <td
              align="center"
              valign="top"
              class="email-card"
              bgcolor="#90C3FF"
              style="
                width:100%;
                max-width:560px;
                height:640px;
                background-color:#90C3FF;
                background-image:url('http://localhost:3000/emailmasskot.svg');
                background-repeat:no-repeat;
                background-position:center bottom;
                background-size:100% auto;
                font-family:Helvetica,Arial,sans-serif;
              "
            >
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family:Helvetica,Arial,sans-serif;">
                <tr>
                  <td class="email-spacer-top" height="265" style="height:265px;line-height:265px;font-size:1px;">&nbsp;</td>
                </tr>
                <tr>
                  <td
                    align="left"
                    class="email-pad email-h1"
                    style="padding:0 28px 10px;color:#ffffff;font-size:22px;font-weight:bold;line-height:1.3;text-align:left;text-shadow:0 1px 2px rgba(0,0,0,0.15);font-family:Helvetica,Arial,sans-serif;"
                  >
                    Поздравляем!
                  </td>
                </tr>
                <tr>
                  <td
                    align="left"
                    class="email-pad email-lead"
                    style="padding:0 28px 0;color:#ffffff;font-size:16px;line-height:1.5;text-align:left;text-shadow:0 1px 2px rgba(0,0,0,0.12);font-family:Helvetica,Arial,sans-serif;"
                  >
                    За последние 24 часа ваш сайт значительно вырос в охватах!
                  </td>
                </tr>
                <tr>
                  <td
                    align="left"
                    class="email-pad-tight email-body"
                    style="padding:22px 28px 0;color:#ffffff;font-size:15px;line-height:1.55;text-align:left;text-shadow:0 1px 2px rgba(0,0,0,0.12);font-family:Helvetica,Arial,sans-serif;"
                  >
                    Заходите, чтобы получить полезный совет.<br />
                    Ваш цифровой помощник, BizGuide
                  </td>
                </tr>
                <tr>
                  <td class="email-spacer-mid" height="168" style="height:168px;line-height:168px;font-size:1px;">&nbsp;</td>
                </tr>
                <tr>
                  <td align="center" class="email-btn-wrap" style="padding:0 28px 5px;font-family:Helvetica,Arial,sans-serif;text-align:center;">
                    <a
                      class="email-btn"
                      href="http://localhost:3000/"
                      style="
                        display:inline-block;
                        padding:14px 36px;
                        font-family:Helvetica,Arial,sans-serif;
                        font-size:16px;
                        font-weight:300;
                        color:#ffffff;
                        text-decoration:none;
                        border-radius:25px;
                        text-align:center;
                        background-color:#237BEE;
                        background-image:linear-gradient(to right, #237BEE 0%, #9CCAFF 100%);
                      "
                    >
                      Перейти на сайт
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
